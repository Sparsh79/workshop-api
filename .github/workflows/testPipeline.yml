name: Run Postman Tests

permissions:
pull-requests: write

on:
pull_request:
branches:
- main

jobs:
run-newman-tests:
name: Postman Tests
runs-on: ubuntu-latest

steps:
  - name: Checkout Code
    uses: actions/checkout@v4

  - name: Setup Node.js
    uses: actions/setup-node@v4
    with:
      node-version: '18'

  - name: Install Project Dependencies
    run: npm install

  - name: Start Application Services
    run: |
      npm run start &
      echo "Application starting in background..."

  - name: Wait for API Health Check
    run: |
      echo "Waiting for API to become available...
      for i in {1..30}; do
        if curl -s http://localhost:3000/health > /dev/null; then
          echo "API is up and running!"
          exit 0
        fi
        echo "Attempt $i/30 - API not ready yet..."
        sleep 2
      done

      echo "API failed to start within expected time."
      exit 1

  - name: Create Test Artifact Directory
    run: mkdir -p testArtifacts

  - name: Install Newman and HTML Reporter
    run: |
      npm install -g newman
      npm install -g newman-reporter-htmlextra

  - name: Run Postman Collection
    run: |
      newman run "Workshop API.postman_collection.json" \
        -r cli,htmlextra \
        --reporter-htmlextra-export testArtifacts/newman-report.html

  - name: Upload Newman Report
    uses: actions/upload-artifact@v4
    with:
      name: newman-test-report
      path: testArtifacts/newman-report.html
      retention-days: 30